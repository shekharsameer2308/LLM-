services:
  # 1. FastAPI Backend Web Service (SQLite default)
  - type: web
    name: scout-backend
    runtime: docker
    dockerfilePath: docker/Dockerfile.backend
    context: .
    plan: free
    port: 8000
    envVars:
      - key: DATABASE_URL
        value: sqlite:///scout_db.db
      - key: NEWSAPI_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false

  # 2. Streamlit Frontend Web Service
  - type: web
    name: scout-frontend
    runtime: docker
    dockerfilePath: docker/Dockerfile.frontend
    context: .
    plan: free
    port: 8501
    envVars:
      - key: API_URL
        value: http://scout-backend:8000
